name: Mobile — Android release

# Build and (optionally) submit the Android AAB to Google Play whenever a
# `mobile-v*` tag is pushed, e.g. `git tag mobile-v0.1.0 && git push --tags`.
#
# Required repository secrets:
#   EXPO_TOKEN                          https://expo.dev/accounts/<you>/settings/access-tokens
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON    (optional, enables auto-submit) full JSON
#                                       of a Play-Console service account with
#                                       "Release manager" permission.
#
# Without GOOGLE_PLAY_SERVICE_ACCOUNT_JSON the workflow only builds the AAB and
# leaves the download link in the job summary — you can then submit manually
# from Play Console.

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
      submit:
        description: Also submit to Google Play after build
        required: true
        default: false
        type: boolean

jobs:
  build:
    name: EAS build (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build @stocktrace/core
        run: npm -w @stocktrace/core run build

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build (Android, ${{ github.event.inputs.profile || 'production' }})
        working-directory: apps/mobile
        env:
          EAS_PROFILE: ${{ github.event.inputs.profile || 'production' }}
        run: |
          # Block until EAS finishes the build (~15 min) so the downstream
          # `submit` job can pick up the build we just triggered rather than
          # racing a stale previous build.
          eas build \
            --platform android \
            --profile "$EAS_PROFILE" \
            --non-interactive

      - name: Summary
        env:
          EXPO_ACCOUNT_NAME: ${{ secrets.EXPO_ACCOUNT_NAME }}
        run: |
          account="${EXPO_ACCOUNT_NAME:-your-account}"
          {
            echo "### Android build complete"
            echo "Download the AAB/APK at https://expo.dev/accounts/${account}/projects/stocktrace-mobile/builds"
          } >> "$GITHUB_STEP_SUMMARY"

  submit:
    name: Submit to Google Play (internal track)
    if: ${{ github.event.inputs.submit == 'true' || startsWith(github.ref, 'refs/tags/mobile-v') }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Play service-account JSON
        if: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        working-directory: apps/mobile
        env:
          # Pipe the secret through an env var instead of interpolating it
          # directly into the `run:` body so JSON metacharacters (quotes,
          # braces, backticks) can't break the shell or trigger command
          # substitution.
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$SERVICE_ACCOUNT_JSON" > google-play-service-account.json

      - name: EAS submit (latest Android build)
        if: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        working-directory: apps/mobile
        run: |
          eas submit --platform android --profile production --latest --non-interactive

      - name: Skip submit (no Play service-account configured)
        if: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON == '' }}
        run: |
          echo "::notice::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON not set — skipping auto-submit. Download the AAB from the EAS build page and upload to Play Console manually."
