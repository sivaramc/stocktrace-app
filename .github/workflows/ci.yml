name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    name: Core (packages/core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm -w @stocktrace/core run lint
      - run: npm -w @stocktrace/core run build

  web:
    name: Web (apps/web)
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm -w @stocktrace/core run build
      - run: npm -w @stocktrace/web run lint
      - run: npm -w @stocktrace/web run typecheck
      - run: npm -w @stocktrace/web run build

  mobile:
    name: Mobile (apps/mobile)
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm -w @stocktrace/core run build
      - run: npm -w @stocktrace/mobile run lint
      - run: npm -w @stocktrace/mobile run typecheck
